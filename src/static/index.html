<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="header-bar">
        <div>
          <h1>Mergington High School</h1>
          <h2>Extracurricular Activities</h2>
        </div>
        <div class="teacher-access">
          <button id="login-toggle" type="button" class="secondary-button">Teacher Login</button>
        </div>
      </div>
    </header>

    <main>
      <section id="auth-container">
        <div class="auth-panel-header">
          <div>
            <h3>Teacher Access</h3>
            <p id="auth-status">Teachers can manage registrations after signing in.</p>
          </div>
          <button id="logout-button" type="button" class="secondary-button hidden">Log Out</button>
        </div>

        <form id="login-form" class="auth-form hidden">
          <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" required placeholder="principal.wilson" />
          </div>
          <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" required placeholder="Enter teacher password" />
          </div>
          <button type="submit">Log In</button>
        </form>
      </section>

      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <p id="signup-help-text" class="section-note">
          Teacher login is required to register or unregister students.
        </p>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
